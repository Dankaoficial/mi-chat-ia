<!DOCTYPE html>

<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat con IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 90vh;
      max-height: 700px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    #header {
      padding: 16px 20px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #1D9E75; }
    #header h1 { font-size: 16px; font-weight: 600; color: #111; }
    #header span { font-size: 12px; color: #999; margin-left: auto; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg { display: flex; gap: 10px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
    }
    .msg.user .avatar { background: #1D9E75; color: #fff; }
    .msg.assistant .avatar { background: #e8f4ff; color: #185FA5; }
    .bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap;
    }
    .msg.user .bubble { background: #1D9E75; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: #f5f5f5; color: #111; border-bottom-left-radius: 4px; }
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
    #error-msg { font-size: 12px; color: #e24b4a; text-align: center; padding: 4px 20px; display: none; }
    #input-area {
      padding: 16px 20px; border-top: 1px solid #e8e8e8;
      display: flex; gap: 10px; align-items: flex-end; background: #fff;
    }
    #user-input {
      flex: 1; border: 1px solid #ddd; border-radius: 24px;
      padding: 10px 16px; font-size: 14px; font-family: inherit;
      resize: none; min-height: 44px; max-height: 120px;
      outline: none; line-height: 1.5; color: #111; background: #f9f9f9;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #1D9E75; background: #fff; }
    #send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: #1D9E75; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover { opacity: 0.88; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="dot"></div>
    <h1>Chat con IA</h1>
    <span>powered by Groq</span>
  </div>
  <div id="messages">
    <div class="msg assistant">
      <div class="avatar">AI</div>
      <div class="bubble">¡Hola! Soy un asistente de IA. ¿En qué puedo ayudarte hoy?</div>
    </div>
  </div>
  <div id="error-msg"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const errorEl    = document.getElementById('error-msg');
  const history    = [];
  const API_KEY    = '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';

  function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'Tú' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="avatar">AI</div><div class="bubble typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    errorEl.style.display = 'none';
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + API_KEY
        },
        body: JSON.stringify({
          model: 'llama3-8b-8192',
          messages: [
            { role: 'system', content: 'Eres un asistente útil y amigable. Responde siempre en el idioma del usuario.' },
            ...history
          ]
        })
      });
      const data = await res.json();
      hideTyping();
      const reply = data.choices?.[0]?.message?.content || 'No pude obtener una respuesta.';
      addMessage('assistant', reply);
      history.push({ role: 'assistant', content: reply });
    } catch (e) {
      hideTyping();
      errorEl.textContent = 'Error al conectar. Intenta de nuevo.';
      errorEl.style.display = 'block';
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>


</body></html>
